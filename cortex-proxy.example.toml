# Cortex Proxy Configuration (example)
#
# Copy to one of:
#   - ~/.config/cortex-proxy/config.toml (recommended)
#   - ./cortex-proxy.toml
#   - ./config.toml
#
# Or specify with: cortex-proxy --config /path/to/config.toml
# Or environment: CORTEX_PROXY_CONFIG=/path/to/config.toml

[proxy]
# Port to listen on
port = 8766

# Log level: "debug", "info", or "quiet"
log_level = "info"

# Request timeout in seconds (default: 300 = 5 minutes)
# Increase for large file operations
timeout_secs = 300

# HTTP connection pool size per host (default: 10)
# Increase if making many concurrent requests
connection_pool_size = 10

# ============ Backend Selection ============
# The [backend] section selects which LLM provider to route requests to.
# If omitted, defaults to "cortex" (Snowflake Cortex) using the [snowflake] section.
#
# Supported types: "cortex" | "openai" | "anthropic" | "ollama"
#
# Any AI client (Anthropic or OpenAI format) can talk to any backend.
# The proxy translates between formats automatically.

# --- Option 1: Snowflake Cortex (default) ---
# Omit [backend] entirely and configure [snowflake] below.

# --- Option 2: OpenAI ---
# [backend]
# type = "openai"
# base_url = "https://api.openai.com/v1"
# api_key = "sk-..."
# default_model = "gpt-4o"

# --- Option 3: Anthropic ---
# [backend]
# type = "anthropic"
# base_url = "https://api.anthropic.com"
# api_key = "sk-ant-..."
# default_model = "claude-sonnet-4-20250514"
# anthropic_version = "2023-06-01"

# --- Option 4: Ollama (local) ---
# [backend]
# type = "ollama"
# base_url = "http://localhost:11434/v1"
# default_model = "llama3.1"

# ============ Snowflake Cortex ============
# Required when backend is "cortex" (the default).
# Omit when using a different backend.

[snowflake]
# Your Snowflake account's Cortex API URL
# Format: https://<account>.snowflakecomputing.com/api/v2/cortex/v1
base_url = "https://<account>.snowflakecomputing.com/api/v2/cortex/v1"

# Programmatic Access Token (PAT)
# Generate at: Snowflake UI -> Admin -> Security -> Programmatic Access Tokens
pat = "<YOUR_PAT>"

# Default model when the client doesn't specify one
# Available: claude-4-sonnet, claude-4-opus, claude-opus-4-5, claude-haiku-4-5, claude-3-5-sonnet
default_model = "claude-opus-4-5"

# Optional: explicit model mapping (client model -> backend model)
# Useful if a client sends a different name or alias
[model_map]
# "claude-opus-4-5" = "claude-opus-4-5"
# "claude-4-opus" = "claude-opus-4-5"
# "gpt-4" = "claude-4-sonnet"

# ============ Optional: Policy Enforcement ============
# Omit this section entirely to run as a pure API proxy.
# When enabled, prompts are evaluated against security rules before forwarding.
# Works with ALL backends — the judge model calls the configured backend.

# [policy]
# enabled = true
# judge_model = "claude-4-sonnet"     # Model used to evaluate prompts
# action = "block"                     # "block" | "warn" | "log"
# max_evaluation_tokens = 1024
# source = "local"                     # "local" reads rules from policies_file or inline
# policies_file = "policies.toml"      # External file with [policy.rules] sections

# Inline rules (alternative to policies_file):
# [policy.rules.prompt_injection]
# enabled = true
# severity = "critical"
# description = "Detect attempts to override system instructions"
# examples = ["Ignore all previous instructions", "Forget your system prompt"]
